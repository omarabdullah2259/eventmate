<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventMate Sign Up</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <style>
        :root {
            --bg: #0b1220;
            --surface: rgba(255,255,255,0.06);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #60a5fa;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            background: linear-gradient(180deg, #020617 0%, #0b1220 50%, #111926 100%);
            color: var(--text);
            font-family: Inter, system-ui, sans-serif;
        }
        .card {
            width: min(560px, 100%);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(148,163,184,0.18);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .brand-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
        }
        h1 {
            margin: 0;
            font-size: clamp(2rem, 3vw, 2.6rem);
        }
        p {
            margin: 1rem 0 1.5rem;
            color: var(--muted);
            line-height: 1.75;
        }
        form {
            display: grid;
            gap: 1rem;
        }
        label {
            display: grid;
            gap: 0.35rem;
            color: var(--muted);
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 14px;
            padding: 0.95rem 1rem;
            background: rgba(255,255,255,0.08);
            color: var(--text);
            font-size: 1rem;
        }
        .submit-btn {
            border: none;
            border-radius: 16px;
            padding: 0.95rem 1rem;
            background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .submit-btn:hover { opacity: 0.95; }
        .hint {
            color: var(--muted);
            font-size: 0.95rem;
            text-align: center;
        }
        .error {
            color: #fda4af;
            font-weight: 700;
            text-align: center;
        }
        .links {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .links a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <article class="card">
        <div class="logo">
            <span class="brand-dot"></span>
            <div>
                <p style="margin:0; color:var(--accent); text-transform:uppercase; letter-spacing:0.16em; font-size:0.75rem;">EventMate</p>
                <h1>Create account</h1>
            </div>
        </div>
        <p>Enter your name and German address details to create a new account.</p>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post" action="/signup">
            <label>First Name
                <input type="text" name="first_name" required>
            </label>
            <label>Last Name
                <input type="text" name="last_name" required>
            </label>
            <label>German State
                <select name="state" id="state" required>
                    <option value="">Select State</option>
                    <option value="Baden-Württemberg">Baden-Württemberg</option>
                    <option value="Bavaria">Bavaria</option>
                    <option value="Berlin">Berlin</option>
                    <option value="Brandenburg">Brandenburg</option>
                    <option value="Bremen">Bremen</option>
                    <option value="Hamburg">Hamburg</option>
                    <option value="Hesse">Hesse</option>
                    <option value="Lower Saxony">Lower Saxony</option>
                    <option value="Mecklenburg-Vorpommern">Mecklenburg-Vorpommern</option>
                    <option value="North Rhine-Westphalia">North Rhine-Westphalia</option>
                    <option value="Rhineland-Palatinate">Rhineland-Palatinate</option>
                    <option value="Saarland">Saarland</option>
                    <option value="Saxony">Saxony</option>
                    <option value="Saxony-Anhalt">Saxony-Anhalt</option>
                    <option value="Schleswig-Holstein">Schleswig-Holstein</option>
                    <option value="Thuringia">Thuringia</option>
                </select>
            </label>
            <label id="cityLabel" style="display:none;">City
                <select name="city" id="city">
                    <option value="">Select City</option>
                    <option value="Bonn">Bonn</option>
                    <option value="Cologne">Cologne</option>
                    <option value="Düsseldorf">Düsseldorf</option>
                    <option value="Dortmund">Dortmund</option>
                    <option value="Essen">Essen</option>
                    <option value="Recklinghausen">Recklinghausen</option>
                    <option value="Gelsenkirchen">Gelsenkirchen</option>
                    <option value="Duisburg">Duisburg</option>
                    <option value="Bochum">Bochum</option>
                    <option value="Wuppertal">Wuppertal</option>
                    <option value="Bielefeld">Bielefeld</option>
                    <option value="Münster">Münster</option>
                </select>
            </label>
            <label>Street Name
                <input type="text" name="street" required>
            </label>
            <label>House Number
                <input type="text" name="house_number" required>
            </label>
            <label>Password
                <input type="password" name="password" required>
            </label>
            <button type="submit" class="submit-btn">Create account</button>
        </form>
        <p class="hint">This signup flow stores the account in your session for this demo app.</p>
        <div class="links">
            <a href="/login">Back to login</a>
            <a href="/login/guest">Continue as Guest</a>
        </div>
    </article>
    <script>
        document.getElementById('state').addEventListener('change', function() {
            var cityLabel = document.getElementById('cityLabel');
            var citySelect = document.getElementById('city');
            if (this.value === 'North Rhine-Westphalia') {
                cityLabel.style.display = 'grid';
                citySelect.required = true;
            } else {
                cityLabel.style.display = 'none';
                citySelect.required = false;
                citySelect.value = '';
            }
        });
    </script>
</body>
</html>
